name: 🧪 Feature Tests (CI)

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

env:
  # Environment Variables for CI
  DB_DATABASE: testing_db
  DB_USERNAME: admin
  DB_PASSWORD: password
  DB_ROOT_PASSWORD: root
  # Must match services in docker-compose.yml (or we can override)

jobs:
  feature-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment Files
        run: |
          # Copy .env.example
          if [ -f .env.example ]; then cp .env.example .env; fi
          if [ -f .env.example.backend ]; then cp .env.example.backend .env.backend; fi
          if [ -f .env.example.devops ]; then cp .env.example.devops .env.devops; fi

          # Set specific testing environment variables
          # We can use sed to replace or just append
          echo "" >> .env
          echo "APP_ENV=testing" >> .env
          
          # Configure Backend Environment for Testing
          echo "" >> .env.backend
          echo "DB_CONNECTION=mysql" >> .env.backend
          echo "DB_HOST=mariadb" >> .env.backend
          echo "DB_PORT=3306" >> .env.backend
          echo "DB_DATABASE=${{ env.DB_DATABASE }}" >> .env.backend
          echo "DB_USERNAME=${{ env.DB_USERNAME }}" >> .env.backend
          echo "DB_PASSWORD=${{ env.DB_PASSWORD }}" >> .env.backend
          echo "MARIADB_ROOT_PASSWORD=${{ env.DB_ROOT_PASSWORD }}" >> .env.backend
          
          # Ensure Redis is configured
          echo "REDIS_HOST=redis" >> .env.backend
          echo "REDIS_PASSWORD=redispassword" >> .env.backend
          
          # Ensure Docker Image Tag is set (needed for docker-compose)
          echo "DOCKER_IMAGE_TAG=latest" >> .env

      - name: Start Containers (Ephemeral Environment)
        run: |
          # Docker Compose needs to build the app image first since we are in CI
          # and the image might not exist locally. We build locally for testing.
          docker compose up -d mariadb redis app

      - name: Wait for Services (Database)
        run: |
          echo "Waiting for MariaDB to be ready..."
          # Wait until MariaDB responds to ping
          # Retry loop 20 times with 3s sleep
          for i in {1..20}; do
            if docker compose exec -T mariadb mariadb-admin ping -h localhost -u root -p${{ env.DB_ROOT_PASSWORD }} --silent; then
                echo "MariaDB is up!"
                break
            fi
            echo "Waiting..."
            sleep 3
          done

      - name: Setup Database (Testing)
        run: |
          # Create testing database if not exists (using root)
          docker compose exec -T mariadb mariadb -u root -p${{ env.DB_ROOT_PASSWORD }} -e "CREATE DATABASE IF NOT EXISTS ${{ env.DB_DATABASE }};"
          docker compose exec -T mariadb mariadb -u root -p${{ env.DB_ROOT_PASSWORD }} -e "GRANT ALL PRIVILEGES ON ${{ env.DB_DATABASE }}.* TO '${{ env.DB_USERNAME }}'@'%';"
          docker compose exec -T mariadb mariadb -u root -p${{ env.DB_ROOT_PASSWORD }} -e "FLUSH PRIVILEGES;"

      - name: Run Migrations (Optional)
        run: |
           # Running migration is usually part of tests (RefreshDatabase trait)
           # But sometimes needed explicitly
           docker compose exec -T app php artisan migrate --force

      - name: Run Tests
        run: |
          chmod +x test.sh
          ./test.sh
