name: 🚀 Manual Deploy to Production

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Docker Image Tag (e.g., v1.2.0)'
        required: true
        type: string
        default: 'latest'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (Optional - only needed if you use local scripts)
        uses: actions/checkout@v4

      # -------------------------------------------------------------
      # 1. SSH to Server & Run Deployment
      # -------------------------------------------------------------
      - name: Execute Remote Deployment Script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_IP }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SERVER_PORT }}
          script_stop: true
          script: |
            # 1. Update Project Files
            # Assumes Git sparse-checkout is used, or files (scripts/infra) are SCP'd previously.
            # If using git sparse-checkout:
            cd /var/www/myapp
            # git pull origin main (Ensure this only pulls scripts/infra if using sparse)
            
            # 2. Run Deploy Script with injected secrets
            # We pass all sensitive production variables as arguments to the script
            # which will inject them into the .env files.
            
            chmod +x scripts/deploy/deploy.sh
            
            ./scripts/deploy/deploy.sh ${{ github.event.inputs.version_tag }} \
              --DOCKER_IMAGE_NAME=ghcr.io/${{ github.repository }} \
              --APP_ENV=production \
              --APP_DEBUG=false \
              --APP_KEY=${{ secrets.PROD_APP_KEY }} \
              --APP_URL=${{ secrets.PROD_APP_URL }} \
              --DB_ROOT_PASSWORD=${{ secrets.PROD_DB_ROOT_PASSWORD }} \
              --DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }} \
              --REDIS_PASSWORD=${{ secrets.PROD_REDIS_PASSWORD }} \
              --AWS_ACCESS_KEY_ID=${{ secrets.PROD_AWS_ACCESS_KEY_ID }} \
              --AWS_SECRET_ACCESS_KEY=${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }} \
              --REVERB_APP_ID=${{ secrets.PROD_REVERB_APP_ID }} \
              --REVERB_APP_KEY=${{ secrets.PROD_REVERB_APP_KEY }} \
              --REVERB_APP_SECRET=${{ secrets.PROD_REVERB_APP_SECRET }} \
              --GRAFANA_ADMIN_PASSWORD=${{ secrets.PROD_GRAFANA_ADMIN_PASSWORD }}
