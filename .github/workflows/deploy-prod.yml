name: 🚀 Manual Deploy to Production

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Docker Image Tag (e.g., v1.2.0)'
        required: true
        type: string
        default: 'latest'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # -------------------------------------------------------------
      # 1. Copy Files to Production Server (SCP)
      # -------------------------------------------------------------
      - name: Copy Files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_SERVER_IP }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SERVER_PORT }}
          source: "scripts,infra,.env.example,.env.example.backend,.env.example.devops,config.json,run.sh,setup.sh,deploy.sh,docker-compose.prod.yml"
          target: "/var/www/myapp"
          strip_components: 0

      # -------------------------------------------------------------
      # 2. SSH to Server & Run Deployment
      # -------------------------------------------------------------
      - name: Execute Remote Deployment Script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_IP }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SERVER_PORT }}
          script_stop: true
          script: |
            # Navigate to project directory
            cd /var/www/myapp
            
            # Preparation: Rename docker-compose.prod.yml -> docker-compose.yml
            # We overwrite the existing one to ensure it's fresh
            mv docker-compose.prod.yml docker-compose.yml
            
            # Set executable permissions
            chmod +x run.sh setup.sh deploy.sh scripts/**/*.sh
            
            # Run Deploy Script with injected secrets
            ./scripts/deploy/deploy.sh ${{ github.event.inputs.version_tag }} \
              --DOCKER_IMAGE_NAME=ghcr.io/${{ github.repository }} \
              --APP_ENV=production \
              --APP_DEBUG=false \
              --APP_KEY=${{ secrets.PROD_APP_KEY }} \
              --APP_URL=${{ secrets.PROD_APP_URL }} \
              --DB_ROOT_PASSWORD=${{ secrets.PROD_DB_ROOT_PASSWORD }} \
              --DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }} \
              --REDIS_PASSWORD=${{ secrets.PROD_REDIS_PASSWORD }} \
              --AWS_ACCESS_KEY_ID=${{ secrets.PROD_AWS_ACCESS_KEY_ID }} \
              --AWS_SECRET_ACCESS_KEY=${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }} \
              --REVERB_APP_ID=${{ secrets.PROD_REVERB_APP_ID }} \
              --REVERB_APP_KEY=${{ secrets.PROD_REVERB_APP_KEY }} \
              --REVERB_APP_SECRET=${{ secrets.PROD_REVERB_APP_SECRET }} \
              --GRAFANA_ADMIN_PASSWORD=${{ secrets.PROD_GRAFANA_ADMIN_PASSWORD }} \
              --MARIADB_VOLUME_NAME=${{ secrets.PROD_MARIADB_VOLUME_NAME }} \
              --REDIS_VOLUME_NAME=${{ secrets.PROD_REDIS_VOLUME_NAME }} \
              --MINIO_VOLUME_NAME=${{ secrets.PROD_MINIO_VOLUME_NAME }}
